name: Build PDF & Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc & LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-lang-french texlive-xetex latexmk fonts-lmodern

      - name: Download CSL style (Chicago full note — footnotes)
        run: |
          curl -sSfL "https://www.zotero.org/styles/chicago-fullnote-bibliography" -o chicago-note.csl

      - name: Convert Markdown to PDF via LaTeX
        run: |
          pandoc REDACTION_MEMOIRE_NOUVEAU.md \
            --template=template.tex \
            --pdf-engine=pdflatex \
            --no-highlight \
            --citeproc \
            --bibliography=references.bib \
            --csl=chicago-note.csl \
            --metadata-file=metadata.yaml \
            --toc \
            --number-sections \
            -o memoire.pdf > pandoc.log 2>&1

      - name: Upload Pandoc Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pandoc-log
          path: pandoc.log

      - name: Push Pandoc Log to repo
        if: always()
        run: |
          if [ -f pandoc.log ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pandoc.log
            git commit -m "chore: upload pandoc log [skip ci]" || echo "No changes to commit"
            git push
          fi

      - name: Also generate standalone .tex
        run: |
          pandoc REDACTION_MEMOIRE_NOUVEAU.md \
            --template=template.tex \
            --standalone \
            --no-highlight \
            --citeproc \
            --bibliography=references.bib \
            --csl=chicago-note.csl \
            --metadata-file=metadata.yaml \
            --toc \
            --number-sections \
            -o memoire.tex

      - name: Prepare Pages directory
        run: |
          mkdir -p _site
          cp memoire.pdf _site/
          cp memoire.tex _site/
          cp index.html _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
